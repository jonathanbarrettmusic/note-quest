<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#1a1a2e">
  <title>Note Quest ⚔️</title>
  <script src="https://cdn.jsdelivr.net/npm/vexflow@5.0.0/build/cjs/vexflow.js"></script>
  <style>
    :root {
      --bg:       #1a1a2e;
      --bg2:      #16213e;
      --surface:  #0f3460;
      --card-bg:  #faf8f0;
      --card-sh:  rgba(0,0,0,.4);
      --accent:   #e94560;
      --gold:     #ffd700;
      --green:    #4ade80;
      --red:      #f87171;
      --text:     #f0f0f0;
      --text-dim: #9ca3af;
      --r: 10px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      max-width: 480px;
      margin: 0 auto;
      min-height: 100%;
      display: flex; flex-direction: column;
      -webkit-text-size-adjust: 100%;
      user-select: none;
    }

    /* ── Screens ── */
    .screen { display: none; flex: 1; flex-direction: column; }
    .screen.active { display: flex; }

    /* ════════════ MENU ════════════ */
    #screen-menu {
      align-items: center;
      padding: 2rem 1.25rem 1.5rem;
      gap: 1.25rem;
    }
    .logo { font-size: 3rem; text-align: center; }
    .game-title {
      font-size: 2.2rem; font-weight: 900;
      background: linear-gradient(135deg, var(--gold), var(--accent));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      letter-spacing: -.02em; text-align: center;
    }
    .game-sub { font-size: .88rem; color: var(--text-dim); text-align: center; }

    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      gap: .5rem; padding: .75rem 2rem; border: none; border-radius: var(--r);
      font-size: 1rem; font-weight: 700; cursor: pointer; min-height: 48px;
      transition: transform .1s, opacity .1s;
    }
    .btn:active { transform: scale(.96); opacity: .85; }
    .btn-primary { background: var(--accent); color: #fff; width: 100%; font-size: 1.1rem; }
    .btn-ghost   { background: rgba(255,255,255,.08); color: var(--text); border: 1px solid rgba(255,255,255,.15); }
    .btn-gold    { background: var(--gold); color: #1a1a2e; }

    /* Leaderboard */
    .lb-title { font-size: .75rem; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--text-dim); align-self: flex-start; width: 100%; }
    .lb-table { width: 100%; border-collapse: collapse; font-size: .85rem; }
    .lb-table th { color: var(--text-dim); font-size: .7rem; text-transform: uppercase; letter-spacing: .06em; padding: .35rem .5rem; text-align: left; border-bottom: 1px solid rgba(255,255,255,.08); }
    .lb-table td { padding: .45rem .5rem; border-bottom: 1px solid rgba(255,255,255,.05); }
    .lb-table tr:first-child td { color: var(--gold); font-weight: 700; }
    .lb-table tr:nth-child(2) td { color: #c0c0c0; }
    .lb-table tr:nth-child(3) td { color: #cd7f32; }
    .lb-rank { color: var(--text-dim); font-size: .8rem; width: 24px; }
    .lb-score { text-align: right; font-weight: 600; font-variant-numeric: tabular-nums; }
    .lb-empty { color: var(--text-dim); font-size: .85rem; text-align: center; padding: 1rem; }

    /* ════════════ GAME ════════════ */
    #screen-game { padding: 0; gap: 0; overflow: hidden; }

    /* Enemy zone */
    .enemy-zone {
      background: var(--bg2);
      padding: .75rem 1rem .6rem;
      border-bottom: 1px solid rgba(255,255,255,.06);
    }
    .enemy-row {
      display: flex; align-items: center; gap: .75rem; margin-bottom: .5rem;
    }
    .enemy-emoji {
      font-size: 5rem; line-height: 1;
      width: 88px; text-align: center; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,.5));
    }
    .enemy-emoji.enemy-hit  { animation: enemyHit  .5s ease forwards; }
    .enemy-emoji.player-atk { animation: playerAtk .4s ease forwards; }
    .enemy-info { flex: 1; }
    .enemy-name { font-size: .82rem; font-weight: 700; color: var(--text-dim); }
    .enemy-hp-text { font-size: .72rem; color: var(--text-dim); margin-top: 1px; }
    .combo-badge {
      font-size: .72rem; font-weight: 800; color: var(--gold);
      background: rgba(255,215,0,.12); border: 1px solid rgba(255,215,0,.3);
      border-radius: 20px; padding: .2rem .6rem;
      display: none;
    }
    .combo-badge.visible { display: block; }

    /* HP bars */
    .hp-bar-wrap { height: 10px; background: rgba(255,255,255,.08); border-radius: 5px; overflow: hidden; margin-top: 4px; }
    .hp-bar { height: 100%; border-radius: 5px; transition: width .3s ease; }
    .hp-enemy { background: linear-gradient(90deg, #f43f5e, #fb923c); }
    .hp-player { background: linear-gradient(90deg, #4ade80, #22d3ee); }
    .hp-bar.danger { background: var(--red) !important; }

    /* Timer */
    .timer-wrap { height: 5px; background: rgba(255,255,255,.06); border-radius: 3px; overflow: hidden; margin-top: .4rem; }
    .timer-bar {
      height: 100%; border-radius: 3px;
      background: var(--gold);
      transition: width linear, background .3s;
    }
    .timer-bar.urgent { background: var(--red); }

    /* Score row */
    .score-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: .4rem 1rem;
      background: rgba(0,0,0,.25);
      font-size: .78rem;
    }
    .score-label { color: var(--text-dim); }
    .score-val { font-weight: 800; font-variant-numeric: tabular-nums; color: var(--gold); }
    .player-hp-zone { display: flex; align-items: center; gap: .5rem; }
    .player-hp-bar-wrap { width: 80px; }

    /* Staff zone */
    .staff-zone {
      flex: 1;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: .5rem 1rem;
      min-height: 0;
    }
    .clef-label {
      font-size: .7rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .08em; color: var(--text-dim); margin-bottom: .25rem;
    }
    .staff-container {
      width: 100%;
      background: white; border-radius: var(--r);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    .staff-container svg { display: block; }

    /* Feedback flash */
    .feedback {
      font-size: 1.6rem; font-weight: 900; text-align: center;
      min-height: 2rem; letter-spacing: .05em;
      transition: opacity .2s;
    }
    .feedback.correct { color: var(--green); }
    .feedback.wrong   { color: var(--red);   }

    /* Hand */
    .hand-zone {
      padding: .6rem 1rem .75rem;
      background: var(--bg2);
      border-top: 1px solid rgba(255,255,255,.06);
    }
    .hand-label { font-size: .65rem; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--text-dim); margin-bottom: .5rem; }
    .hand {
      display: flex; gap: 8px;
      justify-content: center;
    }

    /* Cards */
    .card {
      width: 62px; height: 86px;
      background: var(--card-bg);
      border-radius: 8px;
      box-shadow: 0 4px 12px var(--card-sh);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      cursor: pointer;
      transition: transform .15s, box-shadow .15s;
      position: relative;
      border: 2px solid transparent;
      color: #1a1a2e;
      gap: 2px;
    }
    .card:active { transform: translateY(-4px) scale(1.04); box-shadow: 0 8px 20px var(--card-sh); }
    .card:hover  { transform: translateY(-6px); box-shadow: 0 10px 22px var(--card-sh); }
    .card.played {
      animation: cardPlay .25s ease forwards;
      pointer-events: none;
    }
    .card.wrong-flash { animation: wrongFlash .3s ease; }
    .card-name {
      font-size: 1.35rem; font-weight: 900; line-height: 1;
      color: #1a1a2e;
    }
    .card-name.sharp   { color: #2563eb; }
    .card-name.flat    { color: #7c3aed; }
    .card-suit { font-size: .95rem; opacity: .4; }
    .card-corner {
      position: absolute; top: 4px; left: 6px;
      font-size: .55rem; font-weight: 700; color: #555; line-height: 1;
    }

    /* ════════════ DAMAGE FLOATERS ════════════ */
    .floater {
      position: fixed; font-size: 1.4rem; font-weight: 900;
      pointer-events: none; z-index: 999;
      animation: float 0.9s ease forwards;
    }
    .floater.hit   { color: var(--green); }
    .floater.dmg   { color: var(--red);   }
    .floater.miss  { color: #fb923c;      }

    /* ════════════ GAME OVER / VICTORY ════════════ */
    #screen-gameover, #screen-victory {
      align-items: center; justify-content: center;
      padding: 2rem 1.5rem; gap: 1rem; text-align: center;
    }
    .end-icon { font-size: 4rem; }
    .end-title { font-size: 2rem; font-weight: 900; }
    .end-score { font-size: 2.8rem; font-weight: 900; color: var(--gold); }
    .end-sub { font-size: .9rem; color: var(--text-dim); }
    .name-input {
      width: 100%; padding: .7rem 1rem; border: 2px solid rgba(255,255,255,.15);
      border-radius: var(--r); background: rgba(255,255,255,.06); color: var(--text);
      font-size: 1rem; text-align: center; outline: none;
    }
    .name-input:focus { border-color: var(--gold); }
    .wave-summary { font-size: .85rem; color: var(--text-dim); }

    /* ── Animations ── */
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25%      { transform: translateX(-6px); }
      75%      { transform: translateX(6px); }
    }
    @keyframes cardPlay {
      0%   { transform: translateY(0) scale(1); opacity: 1; }
      60%  { transform: translateY(-30px) scale(1.1); opacity: .8; }
      100% { transform: translateY(-60px) scale(.8); opacity: 0; }
    }
    @keyframes wrongFlash {
      0%,100% { background: var(--card-bg); }
      40%     { background: #fecaca; }
    }
    @keyframes float {
      0%   { transform: translateY(0);    opacity: 1; }
      100% { transform: translateY(-60px); opacity: 0; }
    }
    @keyframes pulse {
      0%,100% { opacity: 1; }
      50%     { opacity: .5; }
    }
    .pulsing { animation: pulse 1s ease infinite; }

    /* Boss glow */
    .boss-glow { text-shadow: 0 0 20px #f43f5e, 0 0 40px #f43f5e; }

    /* ── Hit animations ── */
    @keyframes enemyHit {
      0%   { transform: scale(1)    translateX(0);   filter: drop-shadow(0 4px 8px rgba(0,0,0,.5)) brightness(1); }
      15%  { transform: scale(1.2)  translateX(6px); filter: drop-shadow(0 4px 8px rgba(0,0,0,.5)) brightness(3) saturate(0); }
      40%  { transform: scale(.85)  translateX(-8px);filter: drop-shadow(0 4px 8px rgba(0,0,0,.5)) brightness(1.8) sepia(1) saturate(4) hue-rotate(-20deg); }
      70%  { transform: scale(1.05) translateX(4px); filter: drop-shadow(0 4px 8px rgba(0,0,0,.5)) brightness(1); }
      100% { transform: scale(1)    translateX(0);   filter: drop-shadow(0 4px 8px rgba(0,0,0,.5)) brightness(1); }
    }
    @keyframes screenFlash {
      0%   { opacity: .55; }
      100% { opacity: 0; }
    }
    #screen-flash {
      position: fixed; inset: 0; z-index: 9999;
      background: #f43f5e;
      pointer-events: none;
      opacity: 0;
    }
    #screen-flash.active { animation: screenFlash .5s ease forwards; }

    /* ══════════════════════════════════════════════
       ENVIRONMENT SYSTEM
    ══════════════════════════════════════════════ */
    #screen-game { position: relative; }
    .enemy-zone  { position: relative; z-index: 1; background: rgba(22,33,62,.86); }
    .score-row   { position: relative; z-index: 1; background: rgba(0,0,0,.42); }
    .staff-zone  { position: relative; z-index: 1; }
    .hand-zone   { position: relative; z-index: 1; background: rgba(22,33,62,.90); }
    .staff-container { background: rgba(250,248,240,.93); }

    #game-bg {
      position: absolute; inset: 0; z-index: 0;
      transition: opacity .5s ease;
    }
    #game-bg::before, #game-bg::after {
      content: ''; position: absolute; left: 0; right: 0;
    }

    /* ── Forest · night woodland ── */
    .env-forest {
      background:
        radial-gradient(circle at 78% 14%, rgba(255,255,210,.85) 10px, rgba(220,220,160,.2) 34px, transparent 55px),
        radial-gradient(ellipse at 50% 40%, rgba(10,60,20,.45) 20%, transparent 65%),
        linear-gradient(to bottom, #030c08 0%, #06180e 28%, #0b2e16 58%, #050e08 100%);
      animation: ambientBreathe 10s ease-in-out infinite;
    }
    .env-forest::before {
      bottom: 0; height: 32%;
      background: #031008;
      clip-path: polygon(0 100%,0 55%,4% 28%,8% 52%,12% 18%,16% 42%,20% 58%,24% 22%,28% 46%,33% 36%,38% 54%,43% 12%,48% 40%,53% 50%,58% 20%,62% 44%,67% 56%,72% 24%,76% 46%,81% 34%,86% 52%,90% 22%,94% 46%,98% 37%,100% 52%,100% 100%);
    }

    /* ── Town · warm evening ── */
    .env-town {
      background:
        radial-gradient(ellipse at 50% 0%, rgba(255,140,60,.35) 0%, transparent 55%),
        radial-gradient(circle at 20% 12%, rgba(255,110,50,.6) 8px, rgba(255,80,30,.15) 40px, transparent 70px),
        radial-gradient(circle at 62% 18%, rgba(200,80,20,.4) 6px, rgba(180,60,10,.1) 30px, transparent 55px),
        linear-gradient(to bottom, #100505 0%, #3e1808 30%, #602808 62%, #281005 100%);
      animation: ambientBreathe 12s ease-in-out infinite;
    }
    .env-town::before {
      bottom: 0; height: 40%;
      background: linear-gradient(to bottom, #1e0a03, #100402);
      clip-path: polygon(0 100%,0 60%,5% 60%,5% 30%,10% 30%,10% 50%,15% 50%,15% 20%,20% 20%,20% 10%,25% 10%,25% 20%,30% 20%,30% 50%,38% 50%,38% 35%,43% 35%,43% 50%,50% 50%,50% 15%,56% 15%,56% 5%,62% 5%,62% 15%,68% 15%,68% 50%,75% 50%,75% 30%,80% 30%,80% 50%,87% 50%,87% 40%,92% 40%,92% 55%,100% 55%,100% 100%);
    }

    /* ── Cave · underground dungeon ── */
    .env-cave {
      background:
        radial-gradient(circle at 25% 72%, rgba(0,110,210,.35) 18px, rgba(0,85,170,.1) 55px, transparent 90px),
        radial-gradient(circle at 70% 68%, rgba(0,160,240,.28) 14px, rgba(0,125,195,.08) 45px, transparent 75px),
        radial-gradient(ellipse at 50% 100%, rgba(0,55,115,.45) 0%, transparent 60%),
        linear-gradient(to bottom, #040408 0%, #08082a 32%, #10103c 62%, #060618 100%);
      animation: crystalShimmer 7s ease-in-out infinite;
    }
    .env-cave::before {
      bottom: 0; height: 25%;
      background: #050515;
      clip-path: polygon(0 100%,0 70%,6% 42%,12% 68%,18% 50%,24% 74%,30% 44%,36% 66%,42% 32%,48% 62%,54% 46%,60% 70%,66% 40%,72% 66%,78% 50%,84% 72%,90% 38%,96% 64%,100% 54%,100% 100%);
    }
    .env-cave::after {
      top: 0; height: 20%;
      background: #040415;
      clip-path: polygon(0 0%,0 55%,6% 80%,12% 46%,18% 70%,24% 42%,30% 66%,36% 32%,42% 56%,48% 76%,54% 40%,60% 62%,66% 80%,72% 46%,78% 66%,84% 42%,90% 70%,96% 50%,100% 66%,100% 0%);
    }

    /* ── Dark Wood · haunted forest ── */
    .env-darkwood {
      background:
        radial-gradient(ellipse at 50% 50%, rgba(80,0,120,.22) 0%, transparent 65%),
        radial-gradient(circle at 15% 22%, rgba(160,0,220,.28) 16px, rgba(120,0,180,.07) 60px, transparent 100px),
        radial-gradient(circle at 78% 28%, rgba(120,0,200,.22) 12px, rgba(100,0,160,.05) 50px, transparent 85px),
        linear-gradient(to bottom, #060412 0%, #120828 32%, #1e1048 62%, #080420 100%);
      animation: ambientBreathe 9s ease-in-out infinite;
    }
    .env-darkwood::before {
      bottom: 0; height: 45%;
      background: #07041a;
      clip-path: polygon(0 100%,0 0%,2% 0%,2% 30%,6% 30%,6% 0%,8% 0%,8% 45%,13% 45%,13% 0%,15% 0%,15% 50%,21% 50%,21% 0%,23% 0%,23% 35%,29% 35%,29% 0%,31% 0%,31% 45%,37% 45%,37% 0%,39% 0%,39% 40%,47% 40%,47% 0%,49% 0%,49% 50%,55% 50%,55% 0%,57% 0%,57% 35%,63% 35%,63% 0%,65% 0%,65% 45%,71% 45%,71% 0%,73% 0%,73% 40%,81% 40%,81% 0%,83% 0%,83% 50%,89% 50%,89% 0%,91% 0%,91% 35%,96% 35%,96% 0%,100% 0%,100% 100%);
    }

    /* ── Ruins · ancient graveyard ── */
    .env-ruins {
      background:
        radial-gradient(circle at 50% 22%, rgba(140,175,130,.15) 22px, rgba(100,145,95,.05) 70px, transparent 110px),
        radial-gradient(ellipse at 50% 55%, rgba(55,75,50,.25) 0%, transparent 60%),
        linear-gradient(to bottom, #060806 0%, #0c100a 30%, #151810 60%, #080a06 100%);
      animation: ambientBreathe 14s ease-in-out infinite;
    }
    .env-ruins::before {
      bottom: 0; height: 35%;
      background: #090c08;
      clip-path: polygon(0 100%,0 55%,5% 55%,5% 30%,10% 30%,10% 50%,15% 50%,15% 20%,18% 20%,20% 35%,25% 35%,25% 15%,32% 15%,32% 40%,40% 40%,40% 50%,45% 50%,45% 25%,50% 25%,50% 50%,60% 50%,60% 30%,65% 30%,65% 10%,70% 10%,72% 30%,78% 30%,78% 45%,83% 45%,83% 20%,88% 20%,88% 40%,93% 40%,93% 55%,100% 55%,100% 100%);
    }

    /* ── Castle · gothic interior ── */
    .env-castle {
      background:
        radial-gradient(circle at 50% 0%, rgba(80,0,130,.45) 0%, transparent 55%),
        radial-gradient(ellipse at 22% 38%, rgba(100,0,150,.18) 40px, transparent 110px),
        radial-gradient(ellipse at 78% 42%, rgba(80,0,120,.15) 35px, transparent 90px),
        linear-gradient(to bottom, #030006 0%, #08000e 30%, #12001e 62%, #050008 100%);
      animation: castleGlow 8s ease-in-out infinite;
    }
    .env-castle::after {
      top: 0; height: 18%;
      background: #040008;
      clip-path: polygon(0 0%,0 100%,5% 100%,5% 50%,10% 50%,10% 100%,15% 100%,15% 50%,20% 50%,20% 100%,25% 100%,25% 50%,30% 50%,30% 100%,35% 100%,35% 50%,40% 50%,40% 100%,45% 100%,45% 50%,50% 50%,50% 100%,55% 100%,55% 50%,60% 50%,60% 100%,65% 100%,65% 50%,70% 50%,70% 100%,75% 100%,75% 50%,80% 50%,80% 100%,85% 100%,85% 50%,90% 50%,90% 100%,95% 100%,95% 50%,100% 50%,100% 0%);
    }

    /* ── Dragon Lair · volcanic cave ── */
    .env-lair {
      background:
        radial-gradient(ellipse at 50% 100%, rgba(255,100,0,.62) 0%, rgba(200,40,0,.38) 28%, transparent 65%),
        radial-gradient(circle at 20% 86%, rgba(255,160,0,.38) 22px, rgba(255,100,0,.1) 70px, transparent 110px),
        radial-gradient(circle at 72% 82%, rgba(255,120,0,.42) 18px, rgba(255,80,0,.1) 60px, transparent 95px),
        radial-gradient(ellipse at 50% 0%, rgba(100,0,0,.65) 0%, transparent 50%),
        linear-gradient(to bottom, #120000 0%, #380500 35%, #5e1000 65%, #1e0300 100%);
      animation: lavaFlicker 3s ease-in-out infinite;
    }
    .env-lair::before {
      bottom: 0; height: 30%;
      background: linear-gradient(to top, #0e0200, #1e0300);
      clip-path: polygon(0 100%,0 80%,5% 52%,10% 75%,15% 42%,20% 65%,25% 32%,30% 60%,35% 78%,40% 46%,45% 66%,50% 28%,55% 56%,60% 74%,65% 42%,70% 64%,75% 32%,80% 60%,85% 46%,90% 70%,95% 50%,100% 75%,100% 100%);
    }
    .env-lair::after {
      top: 0; height: 15%;
      background: #0e0100;
      clip-path: polygon(0 0%,0 70%,8% 100%,16% 62%,24% 90%,32% 52%,40% 80%,50% 100%,60% 70%,68% 95%,76% 58%,84% 85%,92% 66%,100% 82%,100% 0%);
    }

    /* ── Ambient animations ── */
    @keyframes ambientBreathe {
      0%,100% { filter: brightness(1);    }
      50%      { filter: brightness(1.07); }
    }
    @keyframes crystalShimmer {
      0%,100% { filter: brightness(1)    hue-rotate(0deg);  }
      50%      { filter: brightness(1.12) hue-rotate(12deg); }
    }
    @keyframes castleGlow {
      0%,100% { filter: brightness(1)    saturate(1);    }
      50%      { filter: brightness(1.06) saturate(1.15); }
    }
    @keyframes lavaFlicker {
      0%,100% { filter: brightness(1)    saturate(1);    }
      20%      { filter: brightness(1.18) saturate(1.25); }
      55%      { filter: brightness(.9)   saturate(.85);  }
      78%      { filter: brightness(1.12) saturate(1.18); }
    }

    /* ── New card deal animation ── */
    @keyframes dealCard {
      0%   { transform: translateY(-18px) scale(.9); opacity: 0; }
      100% { transform: translateY(0)     scale(1);  opacity: 1; }
    }
    .card.dealing { animation: dealCard .3s ease forwards; }
  </style>
</head>
<body>

<div id="screen-flash"></div>

<!-- ═══ MENU ═══ -->
<div id="screen-menu" class="screen active">
  <div class="logo">⚔️🎵</div>
  <div>
    <div class="game-title">Note Quest</div>
    <div class="game-sub">Battle enemies by reading music!</div>
  </div>
  <button class="btn btn-primary" onclick="startGame()">▶ Start Game</button>
  <div class="lb-title">🏆 Leaderboard</div>
  <div id="lb-menu" style="width:100%"></div>
</div>

<!-- ═══ GAME ═══ -->
<div id="screen-game" class="screen">
  <div id="game-bg"></div>
  <!-- Enemy zone -->
  <div class="enemy-zone">
    <div class="enemy-row">
      <div class="enemy-emoji" id="enemy-emoji">👺</div>
      <div class="enemy-info">
        <div class="enemy-name" id="enemy-name">Note Goblin</div>
        <div class="enemy-hp-text"><span id="enemy-hp-cur">40</span> / <span id="enemy-hp-max">40</span> HP</div>
        <div class="hp-bar-wrap"><div class="hp-bar hp-enemy" id="enemy-hp-bar" style="width:100%"></div></div>
      </div>
      <div class="combo-badge" id="combo-badge">COMBO ×2</div>
    </div>
    <div class="timer-wrap"><div class="timer-bar" id="timer-bar"></div></div>
  </div>

  <!-- Score + player HP -->
  <div class="score-row">
    <div><span class="score-label">Score </span><span class="score-val" id="score-display">0</span></div>
    <div class="player-hp-zone">
      <span class="score-label" id="player-hp-text">❤️ 100</span>
      <div class="player-hp-bar-wrap hp-bar-wrap">
        <div class="hp-bar hp-player" id="player-hp-bar" style="width:100%"></div>
      </div>
    </div>
  </div>

  <!-- Staff -->
  <div class="staff-zone">
    <div class="clef-label" id="clef-label">Treble Clef</div>
    <div class="staff-container" id="staff-container"></div>
    <div class="feedback" id="feedback"></div>
  </div>

  <!-- Hand -->
  <div class="hand-zone">
    <div class="hand-label">Your hand — play the matching card</div>
    <div class="hand" id="hand"></div>
  </div>
</div>

<!-- ═══ GAME OVER ═══ -->
<div id="screen-gameover" class="screen">
  <div class="end-icon">💀</div>
  <div class="end-title">Defeated!</div>
  <div class="end-score" id="go-score">0</div>
  <div class="wave-summary" id="go-summary"></div>
  <input class="name-input" id="go-name" placeholder="Enter your name" maxlength="20">
  <button class="btn btn-primary" onclick="submitScore(false)">Save Score</button>
  <button class="btn btn-ghost" onclick="showMenu()">Menu</button>
</div>

  <div class="end-icon">🐉✨</div>
  <div class="end-title" style="color:var(--gold)">Victory!</div>
  <div class="end-score" id="vic-score">0</div>
  <div class="wave-summary" id="vic-summary"></div>
  <input class="name-input" id="vic-name" placeholder="Enter your name" maxlength="20">
  <button class="btn btn-gold" onclick="submitScore(true)">🏆 Submit Score</button>
  <button class="btn btn-ghost" onclick="showMenu()">Menu</button>
</div>

<script>
'use strict';
const VF = VexFlow;

// ════════════════════════════════════════════════════════════
//  NOTE DATABASE
// ════════════════════════════════════════════════════════════

      { name:'F', key:'f/5', acc:null },
    ],

      { name:'E', key:'e/3', acc:null },
      { name:'F', key:'f/3', acc:null },
      { name:'G', key:'g/3', acc:null },

      { name:'C', key:'c/4', acc:null },
    ],
    accidental: [
      { name:'B♭', key:'b/2', acc:'b' },
      { name:'E♭', key:'e/3', acc:'b' },
      { name:'F♯', key:'f/3', acc:'#' },

    ],
  },

      { name:'F', key:'f/3', acc:null },

    ],

    ],
  },

// All possible card names for distractor pool
const ALL_NAMES = {
  natural:     ['C','D','E','F','G','A','B'],
  accidental:  ['F♯','C♯','G♯','B♭','E♭','A♭'],
};

// ════════════════════════════════════════════════════════════
//  WAVE CONFIG
// ════════════════════════════════════════════════════════════
const WAVES = [
  // ── Act 1 · Forest ──────────────────────────────────────────
  { name:'Note Goblin',   emoji:'👺', hp:80,  atk:12, bonus:250,  time:8000, clefs:['treble'],               acc:false, env:'forest'  },
  { name:'Goblin Brute',  emoji:'👺', hp:130, atk:14, bonus:400,  time:7500, clefs:['treble'],               acc:false, env:'forest'  },
  // ── Act 2 · Town ────────────────────────────────────────────
  { name:'Clef Bandit',   emoji:'🦊', hp:160, atk:18, bonus:600,  time:7000, clefs:['treble'],               acc:false, env:'town'    },
  // ── Act 3 · Cave ────────────────────────────────────────────
  { name:'Bass Troll',    emoji:'🧌', hp:200, atk:20, bonus:800,  time:6000, clefs:['treble','bass'],        acc:false, env:'cave'    },
  { name:'Cave Ogre',     emoji:'🧌', hp:260, atk:22, bonus:1000, time:5500, clefs:['treble','bass'],        acc:false, env:'cave'    },
  // ── Act 4 · Dark Wood ───────────────────────────────────────
  { name:'Sharp Witch',   emoji:'🧙', hp:250, atk:24, bonus:1100, time:5500, clefs:['treble','bass'],        acc:true,  env:'darkwood' },
  { name:'Coven Elder',   emoji:'🧙', hp:310, atk:26, bonus:1400, time:5000, clefs:['treble','bass'],        acc:true,  env:'darkwood' },
  // ── Act 5 · Ruins ───────────────────────────────────────────
  { name:'Alto Phantom',  emoji:'👻', hp:320, atk:28, bonus:1600, time:4500, clefs:['treble','bass','alto'], acc:true,  env:'ruins'   },
  // ── Act 6 · Castle ──────────────────────────────────────────
  { name:'Dark Maestro',  emoji:'🎩', hp:360, atk:32, bonus:2000, time:4200, clefs:['treble','bass','alto'], acc:true,  env:'castle'  },
  { name:'Grand Maestro', emoji:'🎩', hp:420, atk:35, bonus:2500, time:4000, clefs:['treble','bass','alto'], acc:true,  env:'castle'  },
  // ── Act 7 · Dragon Lair ─────────────────────────────────────
  { name:'Shadow Dragon', emoji:'🐲', hp:480, atk:38, bonus:3500, time:3800, clefs:['treble','bass','alto'], acc:true,  env:'lair'    },
  { name:'DRAGON KING',   emoji:'🐉', hp:650, atk:42, bonus:10000,time:3500, clefs:['treble','bass','alto'], acc:true,  env:'lair',   isBoss:true },
];

const PLAYER_DAMAGE = 30;

// ════════════════════════════════════════════════════════════
//  GAME STATE
// ════════════════════════════════════════════════════════════
let gs = {};  // game state

function resetState() {
  gs = {
    wave:        0,
    playerHp:    100,
    playerMaxHp: 100,
    score:       0,
    combo:       0,
    enemyHp:     0,
    enemyMaxHp:  0,
    currentNote: null,   // { name, key, acc, clef }
    hand:        [],
    newCardIdx:  -1,
    timerStart:  0,
    timerLimit:  7000,
    timerRaf:    null,
    answered:    false,
    running:     false,
  };
}

// ════════════════════════════════════════════════════════════
//  AUDIO
// ════════════════════════════════════════════════════════════
let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function beep(freq, dur, type = 'sine', vol = 0.25) {
  try {
    const ctx  = getAudio();
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = type; osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    osc.start(); osc.stop(ctx.currentTime + dur);
  } catch {}
}
function sfx(type) {
  if (type === 'correct') { beep(880, .12); setTimeout(() => beep(1100, .15), 80); }
  if (type === 'wrong')   { beep(220, .25, 'sawtooth', .15); }
  if (type === 'hit')     { beep(180, .2,  'square',   .2); }
  if (type === 'defeat')  { [500,600,750].forEach((f,i) => setTimeout(() => beep(f,.2), i*120)); }
  if (type === 'boss')    { [300,400,300,500].forEach((f,i) => setTimeout(() => beep(f,.15,'sawtooth'), i*100)); }
}

// ════════════════════════════════════════════════════════════
//  VEXFLOW NOTE RENDERING
// ════════════════════════════════════════════════════════════
function renderNote(clef, noteData) {
  const container = document.getElementById('staff-container');
  container.innerHTML = '';

  const W = Math.min(container.parentElement.clientWidth - 32, 380);
  const H = 120;

  const renderer = new VF.Renderer(container, VF.Renderer.Backends.SVG);
  renderer.resize(W, H);
  const ctx = renderer.getContext();
  ctx.setFont('Arial', 12);

  const stave = new VF.Stave(10, 18, W - 20);
  stave.addClef(clef);
  stave.setContext(ctx).draw();

  const note = new VF.StaveNote({ keys: [noteData.key], duration: 'w', clef });
  if (noteData.acc) note.addModifier(new VF.Accidental(noteData.acc), 0);

  const voice = new VF.Voice({ numBeats: 4, beatValue: 4 }).setStrict(false);
  voice.addTickables([note]);
  new VF.Formatter().joinVoices([voice]).format([voice], W - 80);
  voice.draw(ctx, stave);

  document.getElementById('clef-label').textContent =
    clef === 'treble' ? '𝄞 Treble Clef' : clef === 'bass' ? '𝄢 Bass Clef' : '𝄡 Alto Clef';
}

// ════════════════════════════════════════════════════════════
//  HAND / CARDS
// ════════════════════════════════════════════════════════════
// ── Persistent hand ─────────────────────────────────────────────────────────

function getNamePool() {
  return WAVES[gs.wave].acc
    ? [...ALL_NAMES.natural, ...ALL_NAMES.accidental]
    : [...ALL_NAMES.natural];
}

function initHand() {
  const pool = [...getNamePool()].sort(() => Math.random() - .5);
  gs.hand = pool.slice(0, 5);
  gs.newCardIdx = -1;
}

function drawCard() {
  const pool = getNamePool();
  const available = pool.filter(n => !gs.hand.includes(n));
  const src = available.length ? available : pool;
  return src[Math.floor(Math.random() * src.length)];
}

function replaceCard(name) {
  const idx = gs.hand.indexOf(name);
  if (idx !== -1) { gs.hand[idx] = drawCard(); gs.newCardIdx = idx; }
}

function pickNoteFromHand() {
  const wave = WAVES[gs.wave];
  const candidates = [];
  for (const clef of wave.clefs) {
    const pool = [...NOTE_POOL[clef].natural, ...(wave.acc ? NOTE_POOL[clef].accidental : [])];
    for (const note of pool) {
      if (gs.hand.includes(note.name)) candidates.push({ ...note, clef });
    }
  }
  if (!candidates.length) { initHand(); return pickNoteFromHand(); }
  return candidates[Math.floor(Math.random() * candidates.length)];
}

function renderHand() {
  const handEl = document.getElementById('hand');
  handEl.innerHTML = '';
  gs.hand.forEach((name, idx) => {
    const card = document.createElement('div');
    const isSharp = name.includes('♯');
    const isFlat  = name.includes('♭');
    const cls = isSharp ? 'sharp' : isFlat ? 'flat' : '';
    card.className = 'card' + (idx === gs.newCardIdx ? ' dealing' : '');
    card.innerHTML = `
      <div class="card-corner">${name}</div>
      <div class="card-name${cls ? ' '+cls : ''}">${name}</div>
      <div class="card-suit">♪</div>`;
    card.addEventListener('click', () => playCard(name, card));
    handEl.appendChild(card);
  });
  gs.newCardIdx = -1;
}

// ════════════════════════════════════════════════════════════
//  TIMER
// ════════════════════════════════════════════════════════════
function startTimer() {
  gs.timerStart = performance.now();
  tickTimer();
}

function tickTimer() {
  if (!gs.running || gs.answered) return;
  const elapsed = performance.now() - gs.timerStart;
  const ratio   = Math.max(0, 1 - elapsed / gs.timerLimit);
  const bar     = document.getElementById('timer-bar');
  bar.style.width    = (ratio * 100) + '%';
  bar.className      = 'timer-bar' + (ratio < .3 ? ' urgent pulsing' : '');

  if (ratio <= 0) {
    handleTimeout();
    return;
  }
  gs.timerRaf = requestAnimationFrame(tickTimer);
}

function stopTimer() {
  cancelAnimationFrame(gs.timerRaf);
  document.getElementById('timer-bar').className = 'timer-bar';
}

function timeBonus() {
  const elapsed = performance.now() - gs.timerStart;
  const ratio   = Math.max(0, 1 - elapsed / gs.timerLimit);
  return Math.round(ratio * 150);
}

// ════════════════════════════════════════════════════════════
//  GAME ACTIONS
// ════════════════════════════════════════════════════════════
function newQuestion() {
  if (!gs.running) return;
  gs.answered = false;
  gs.currentNote = pickNoteFromHand();
  renderHand();
  renderNote(gs.currentNote.clef, gs.currentNote);
  clearFeedback();
  startTimer();
}

function playCard(name, cardEl) {
  if (gs.answered || !gs.running) return;
  gs.answered = true;
  stopTimer();

  if (name === gs.currentNote.name) {
    handleCorrect(cardEl);
  } else {
    handleWrong(name, cardEl);
  }
}

function handleCorrect(cardEl) {
  sfx('correct');
  gs.combo++;
  const comboMult = Math.min(4, 1 + (gs.combo - 1) * 0.5);
  const pts = Math.round((100 + timeBonus()) * comboMult);
  gs.score += pts;

  // Animate card
  cardEl.classList.add('played');

  // Damage enemy
  const dmg = Math.round(PLAYER_DAMAGE * comboMult);
  gs.enemyHp = Math.max(0, gs.enemyHp - dmg);
  replaceCard(gs.currentNote.name);

  showFeedback(`+${pts}`, 'correct');
  spawnFloater(`-${dmg}`, 'hit', document.getElementById('enemy-emoji'));
  animateEnemyHit();
  updateUI();

  const wave = WAVES[gs.wave];
  if (wave.isBoss) sfx('boss');

  if (gs.enemyHp <= 0) {
    setTimeout(() => enemyDefeated(), 500);
  } else {
    setTimeout(() => newQuestion(), 600);
  }
}

function handleWrong(name, cardEl) {
  sfx('wrong');
  gs.combo = 0;
  cardEl.classList.add('wrong-flash');
  showFeedback('✗ Wrong!', 'wrong');
  replaceCard(name);
  applyEnemyAttack();
  updateUI();
  setTimeout(() => newQuestion(), 800);
}

function handleTimeout() {
  if (!gs.running || gs.answered) return;
  gs.answered = true;
  gs.combo = 0;
  sfx('hit');
  showFeedback('⏱ Too slow!', 'wrong');
  applyEnemyAttack();
  updateUI();
  setTimeout(() => newQuestion(), 800);
}

function animateEnemyHit() {
  const el = document.getElementById('enemy-emoji');
  el.classList.remove('enemy-hit');
  void el.offsetWidth;
  el.classList.add('enemy-hit');
  el.addEventListener('animationend', () => el.classList.remove('enemy-hit'), { once: true });
}

function animatePlayerHit() {
  const el = document.getElementById('screen-flash');
  el.classList.remove('active');
  void el.offsetWidth;
  el.classList.add('active');
  el.addEventListener('animationend', () => el.classList.remove('active'), { once: true });
}

function applyEnemyAttack() {
  const wave = WAVES[gs.wave];
  gs.playerHp = Math.max(0, gs.playerHp - wave.atk);
  document.getElementById('player-hp-bar').classList.add('danger');
  spawnFloater(`-${wave.atk}`, 'dmg', document.getElementById('player-hp-text'));
  animatePlayerHit();
  setTimeout(() => document.getElementById('player-hp-bar').classList.remove('danger'), 500);

  if (gs.playerHp <= 0) {
    gs.running = false;
    setTimeout(() => gameOver(), 600);
  }
}

function enemyDefeated() {
  sfx('defeat');
  const wave = WAVES[gs.wave];
  gs.score += wave.bonus;

  if (wave.isBoss) {
    victory();
    return;
  }

  gs.wave++;
  if (gs.wave >= WAVES.length) { victory(); return; }

  showFeedback('⚔️ Enemy defeated!', 'correct');
  setTimeout(() => {
    clearFeedback();
    startWave();
  }, 1200);
}

// ════════════════════════════════════════════════════════════
//  WAVE MANAGEMENT
// ════════════════════════════════════════════════════════════
function startWave() {
  const wave = WAVES[gs.wave];
  gs.enemyHp    = wave.hp;
  gs.enemyMaxHp = wave.hp;
  gs.timerLimit = wave.time;

  document.getElementById('enemy-emoji').textContent = wave.emoji;
  document.getElementById('enemy-emoji').className   = 'enemy-emoji' + (wave.isBoss ? ' boss-glow' : '');
  document.getElementById('enemy-name').textContent  = wave.isBoss ? `⚡ ${wave.name}` : wave.name;
  document.getElementById('enemy-hp-max').textContent = wave.hp;

  setEnvironment(wave.env);
  updateUI();
  setTimeout(() => newQuestion(), 400);
}

// ════════════════════════════════════════════════════════════
//  UI UPDATES
// ════════════════════════════════════════════════════════════
function updateUI() {
  const wave = WAVES[gs.wave];

  // Enemy HP
  const enemyPct = gs.enemyHp / gs.enemyMaxHp * 100;
  document.getElementById('enemy-hp-bar').style.width = enemyPct + '%';
  document.getElementById('enemy-hp-cur').textContent = gs.enemyHp;

  // Player HP
  const playerPct = gs.playerHp / gs.playerMaxHp * 100;
  document.getElementById('player-hp-bar').style.width = playerPct + '%';
  document.getElementById('player-hp-text').textContent = `❤️ ${gs.playerHp}`;

  // Score
  document.getElementById('score-display').textContent = gs.score.toLocaleString();

  // Combo
  const badge = document.getElementById('combo-badge');
  if (gs.combo >= 2) {
    badge.textContent = `COMBO ×${Math.min(4, gs.combo)}`;
    badge.classList.add('visible');
  } else {
    badge.classList.remove('visible');
  }

}

function showFeedback(msg, type) {
  const el = document.getElementById('feedback');
  el.textContent = msg;
  el.className = `feedback ${type}`;
}
function clearFeedback() {
  const el = document.getElementById('feedback');
  el.textContent = '';
  el.className = 'feedback';
}

function spawnFloater(text, type, anchor) {
  if (!anchor) return;
  const rect = anchor.getBoundingClientRect();
  const div  = document.createElement('div');
  div.className = `floater ${type}`;
  div.textContent = text;
  div.style.left = (rect.left + rect.width / 2 - 20) + 'px';
  div.style.top  = rect.top + 'px';
  document.body.appendChild(div);
  setTimeout(() => div.remove(), 950);
}

// ════════════════════════════════════════════════════════════
//  GAME START / OVER / VICTORY
// ════════════════════════════════════════════════════════════
function setEnvironment(env) {
  const bg = document.getElementById('game-bg');
  bg.style.opacity = '0';
  setTimeout(() => { bg.className = `env-${env}`; bg.style.opacity = '1'; }, 450);
}

function startGame() {
  resetState();
  initHand();
  gs.running = true;
  showScreen('game');
  startWave();
}

function gameOver() {
  stopTimer();
  gs.running = false;
  document.getElementById('go-score').textContent = gs.score.toLocaleString();
  document.getElementById('go-summary').textContent =
    `Reached Wave ${gs.wave + 1}: ${WAVES[gs.wave].name}`;
  showScreen('gameover');
}

function victory() {
  stopTimer();
  gs.running = false;
  const bonus = 5000;
  gs.score += bonus;
  document.getElementById('vic-score').textContent = gs.score.toLocaleString();
  document.getElementById('vic-summary').textContent =
    `All waves defeated! Boss bonus: +${bonus.toLocaleString()}`;
  showScreen('victory');
}

// ════════════════════════════════════════════════════════════
//  LEADERBOARD
// ════════════════════════════════════════════════════════════
const LB_KEY = 'notequest_lb_v1';

function loadLB() {
  try { return JSON.parse(localStorage.getItem(LB_KEY)) || []; } catch { return []; }
}

function saveLB(lb) {
  localStorage.setItem(LB_KEY, JSON.stringify(lb));
}

function submitScore(isVictory) {
  const inputId = isVictory ? 'vic-name' : 'go-name';
  const name = document.getElementById(inputId).value.trim() || 'Anonymous';
  const lb = loadLB();
  lb.push({
    name,
    score: gs.score,
    date:  new Date().toLocaleDateString('en-GB', { day:'numeric', month:'short' }),
    won:   isVictory,
  });
  lb.sort((a, b) => b.score - a.score);
  saveLB(lb.slice(0, 20));
  showMenu();
}

function renderLB(containerId) {
  const lb  = loadLB();
  const el  = document.getElementById(containerId);
  if (!lb.length) { el.innerHTML = '<p class="lb-empty">No scores yet — play to set the first record!</p>'; return; }
  el.innerHTML = `
    <table class="lb-table">
      <tr><th>#</th><th>Name</th><th>Date</th><th class="lb-score">Score</th></tr>
      ${lb.slice(0,20).map((e, i) => `
        <tr>
          <td class="lb-rank">${i+1}</td>
          <td>${e.name}${e.won ? ' 👑' : ''}</td>
          <td style="color:var(--text-dim);font-size:.75rem">${e.date}</td>
          <td class="lb-score">${e.score.toLocaleString()}</td>
        </tr>`).join('')}
    </table>`;
}

// ════════════════════════════════════════════════════════════
//  SCREEN MANAGEMENT
// ════════════════════════════════════════════════════════════
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
}

function showMenu() {
  stopTimer();
  gs.running = false;
  renderLB('lb-menu');
  showScreen('menu');
}

// ════════════════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  resetState();
  renderLB('lb-menu');
});
</script>
</body>
</html>
